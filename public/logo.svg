<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #05070b; }
    .house { fill: none; stroke: #ffffff; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .play { fill: #ff3b30; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #05070b; }
    }
  </style>

  <!-- тёмный фон -->
  <rect class="bg" x="0" y="0" width="32" height="32" rx="6" />

  <!-- домик: ~90% высоты (от 2 до 30 по Y) -->
  <!-- координаты подобраны, чтобы оставить небольшие поля по краям -->
  <path class="house"
        d="M4 13.5 L16 4 L28 13.5
           M7.5 11.5 V27
           M24.5 11.5 V27
           M7.5 27 H24.5" />

  <!-- кнопка Play внутри домика (~70% внутренней высоты) -->
  <!-- центрируем примерно по центру домика -->
  <polygon class="play"
           points="13,10 21,17 13,24" />
</svg>
