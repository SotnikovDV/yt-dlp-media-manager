<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DVStream — Руководство пользователя</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── Reset & Base ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Source Sans 3',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafbff;color:#1e2433;-webkit-font-smoothing:antialiased;line-height:1.6}
img{max-width:100%;display:block}
code{font-family:'JetBrains Mono',monospace;font-size:0.85em;background:#eef2ff;color:#3730a3;padding:0.1em 0.35em;border-radius:4px}
a{color:#3b82f6;text-decoration:none}
a:hover{text-decoration:underline}
#hero a{color:inherit}

/* ─── Scrollbar ─────────────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9ca3af}

/* ─── Layout ─────────────────────────────────────────────────────────────────── */
#app{display:flex;min-height:100vh}

/* ─── Sidebar ────────────────────────────────────────────────────────────────── */
#sidebar{
  position:fixed;top:0;left:0;bottom:0;width:256px;
  background:#111827;color:rgba(255,255,255,.55);
  display:flex;flex-direction:column;
  z-index:50;transition:transform .25s ease;
  overflow:hidden;
  border-right:1px solid rgba(255,255,255,.1);
}
#sidebar-inner{display:flex;flex-direction:column;height:100%;overflow:hidden}

.sidebar-logo{
  padding:0;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar-logo-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:0.5rem;
  min-height:56px;
  padding:0.5rem 0.5rem;
}
.sidebar-brand{
  display:flex;align-items:center;gap:0.5rem;
  min-width:0;
  text-decoration:none;
  color:inherit;
  flex:1;
}
.sidebar-brand:hover .logo-title{opacity:.92}
.logo-icon{
  width:28px;height:28px;
  border-radius:7px;
  background:#2563eb;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 1px 2px rgba(0,0,0,.15);
}
.logo-icon svg{width:14px;height:14px;margin-left:2px;fill:#fff}
.logo-title{
  font-size:1.25rem;font-weight:500;letter-spacing:-0.02em;
  line-height:1.15;white-space:nowrap;
}
.logo-dv{color:#60a5fa}
.logo-stream{color:#fff}
.sidebar-close-btn{
  display:none;
  flex-shrink:0;
  width:36px;height:36px;
  align-items:center;justify-content:center;
  border:none;border-radius:0.5rem;
  background:transparent;
  color:rgba(255,255,255,.55);
  cursor:pointer;
  padding:0;
}
.sidebar-close-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.sidebar-close-btn svg{width:16px;height:16px}
@media(max-width:1023px){
  .sidebar-close-btn{display:flex}
}

.sidebar-search{padding:12px 16px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:rgba(232,236,245,.3);pointer-events:none}
#search-input{width:100%;padding:8px 32px 8px 32px;font-size:.875rem;font-family:inherit;background:rgba(255,255,255,.06);color:#e8ecf5;border:1px solid rgba(255,255,255,.1);border-radius:8px;outline:none;transition:border-color .15s}
#search-input::placeholder{color:rgba(232,236,245,.3)}
#search-input:focus{border-color:rgba(96,165,250,.5)}
#search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(232,236,245,.4);cursor:pointer;padding:2px;display:none;line-height:1}
#search-clear svg{width:14px;height:14px}

.sidebar-label{font-size:.6rem;font-weight:600;color:rgba(232,236,245,.25);text-transform:uppercase;letter-spacing:.12em;padding:8px 20px 6px}
#nav-list{flex:1;overflow-y:auto;padding:0 8px 16px}
.nav-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:8px;border:none;background:none;
  color:rgba(232,236,245,.65);font-size:.875rem;font-family:inherit;
  cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px;
  position:relative;
}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#e8ecf5}
.nav-btn.active{background:rgba(255,255,255,.1);color:#93c5fd;font-weight:500}
.nav-btn.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 2px 2px 0;background:#93c5fd}
.nav-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-btn.active svg{opacity:1}
.nav-btn.hidden{display:none}

.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.07)}
.sidebar-version{font-size:.65rem;color:rgba(232,236,245,.25);margin-top:6px}

/* ─── Mobile header ─────────────────────────────────────────────────────────── */
#mobile-header{
  display:none;position:fixed;top:0;left:0;right:0;height:52px;
  background:#111827;z-index:40;align-items:center;padding:0 16px;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
#mobile-menu-btn{background:none;border:none;color:#e8ecf5;cursor:pointer;padding:4px;display:flex}
#mobile-menu-btn svg{width:22px;height:22px}
.mobile-logo{font-size:.95rem;font-weight:600;letter-spacing:-0.02em}
.mobile-logo .logo-dv{color:#60a5fa}
.mobile-logo .logo-stream{color:#fff}

/* ─── Overlay ────────────────────────────────────────────────────────────────── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45}

/* ─── Main content ───────────────────────────────────────────────────────────── */
#main{margin-left:256px;flex:1;min-width:0}

/* ─── Hero (градиентная шапка; при прокрутке — узкая закреплённая полоса) ─── */
#hero{
  position:sticky;
  top:0;
  z-index:45;
  overflow:hidden;
  background:linear-gradient(120deg,#0f2d5e 0%,#1e40af 60%,#1d4ed8 100%);
  padding:0;
  transition:box-shadow .22s ease;
}
@media(max-width:1023px){
  #hero{top:52px}
}
#hero.hero--compact{
  box-shadow:0 4px 14px rgba(0,0,0,.18);
}
@media (prefers-reduced-motion:reduce){
  #hero,.hero-inner{transition:none !important}
}
.hero-bg-pattern{
  position:absolute;inset:0;
  opacity:.05;
  background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);
  background-size:12px 12px;
  pointer-events:none;
}
.hero-deco{
  position:absolute;border-radius:50%;border:1px solid rgba(96,165,250,.35);
  pointer-events:none;z-index:1;
}
.hero-deco--lg{right:-2rem;bottom:-2rem;width:12rem;height:12rem;opacity:.35}
.hero-deco--sm{right:-1rem;bottom:-1rem;width:8rem;height:8rem;border-color:rgba(147,197,253,.45);opacity:.4}
.hero-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:2rem 1.25rem 1.75rem;
  max-width:40rem;margin:0 auto;
  transition:padding .22s ease, max-width .22s ease;
}
#hero.hero--compact .hero-inner{
  flex-direction:row;
  align-items:center;
  justify-content:flex-start;
  text-align:left;
  padding:0.5rem 1rem 0.55rem;
  max-width:none;
  width:100%;
  gap:0.75rem;
}
#hero.hero--compact .hero-breadcrumb,
#hero.hero--compact .hero-desc,
#hero.hero--compact .hero-pills,
#hero.hero--compact .hero-bottom-line,
#hero.hero--compact .hero-deco{
  display:none !important;
}
#hero.hero--compact .hero-bg-pattern{opacity:.07}
#hero.hero--compact .hero-title-row{
  margin-bottom:0;
  flex:1;
  min-width:0;
}
#hero.hero--compact .hero-title-icon{
  width:2rem;height:2rem;border-radius:0.5rem;
  margin:0;
}
#hero.hero--compact .hero-title-icon svg{width:1rem;height:1rem}
#hero.hero--compact .hero-title{
  font-size:0.95rem;
  line-height:1.2;
}
#hero.hero--compact .hero-product{
  font-size:0.72rem;
  margin:0.12rem 0 0;
}
.hero-breadcrumb{
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;
  gap:0.2rem 0.35rem;
  font-size:.75rem;font-weight:500;
  color:rgba(147,197,253,.9);
  margin-bottom:1rem;
  list-style:none;padding:0;
}
.hero-breadcrumb a{
  color:#93c5fd;text-decoration:none;
}
.hero-breadcrumb a:hover{color:#e0f2fe;text-decoration:underline}
.hero-bc-home,.hero-bc-chevron{width:12px;height:12px;flex-shrink:0;stroke:currentColor;opacity:.85}
.hero-bc-chevron{opacity:.65;width:10px;height:10px}
.hero-bc-current{color:rgba(186,230,253,.88)}
.hero-title-row{
  display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;
}
.hero-title-icon{
  width:2.5rem;height:2.5rem;border-radius:0.75rem;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 1px 0 rgba(255,255,255,.06) inset;
  color:#fff;
}
.hero-title-icon svg{width:1.25rem;height:1.25rem}
.hero-title-text{text-align:left;min-width:0}
.hero-title{
  font-size:1.35rem;font-weight:700;color:#fff;line-height:1.2;margin:0;
}
.hero-product{
  margin:0.15rem 0 0;font-size:1rem;font-weight:600;color:#93c5fd;
}
.hero-desc{
  font-size:.8125rem;color:rgba(191,219,254,.88);line-height:1.65;
  max-width:28rem;margin:0 0 1rem;
}
.hero-pills{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:0.5rem;
}
.hero-pill{
  padding:0.28rem 0.65rem;border-radius:9999px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);
  font-size:.75rem;color:#bfdbfe;
}
.hero-bottom-line{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(96,165,250,.55),transparent);
  opacity:.55;position:relative;z-index:2;
}

/* ─── Quick nav bar (на мобилке; на desktop скрыт — достаточно sidebar) ───────── */
#quick-nav{
  background:#fff;border-bottom:1px solid #e5e7eb;
  padding:0 48px;overflow-x:auto;white-space:nowrap;
  position:sticky;
  top:0;
  z-index:30;
}
@media(max-width:1023px){
  #quick-nav{
    top:calc(52px + var(--help-hero-sticky-h, 120px));
  }
}
#quick-nav::-webkit-scrollbar{height:0}
.qnav-btn{
  display:inline-block;padding:12px 14px;font-size:.8rem;color:#6b7280;
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;
  border:none;background:none;font-family:inherit;
}
.qnav-btn:hover{color:#3b82f6}
.qnav-btn.active{color:#3b82f6;border-bottom-color:#3b82f6;font-weight:500}

/* ─── Content area ───────────────────────────────────────────────────────────── */
#content{max-width:860px;padding:48px 48px 80px;margin:0 auto}

/* ─── Section ────────────────────────────────────────────────────────────────── */
.doc-section{margin-bottom:64px}
@media(max-width:1023px){
  .doc-section{
    scroll-margin-top:calc(52px + 12px + var(--help-hero-sticky-h, 200px));
  }
}
@media(min-width:1024px){
  #quick-nav{display:none !important;}
  .doc-section{
    scroll-margin-top:calc(8px + var(--help-hero-sticky-h, 200px));
  }
}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-icon{width:40px;height:40px;border-radius:12px;background:rgba(59,130,246,.1);color:#3b82f6;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-icon svg{width:20px;height:20px}
.section-meta{font-size:.7rem;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em}
.section-title{font-size:1.5rem;font-weight:700;color:#1e2433;line-height:1.25}
.section-divider{border:none;border-top:1px solid rgba(0,0,0,.07);margin-bottom:20px}

/* ─── Typography ─────────────────────────────────────────────────────────────── */
.doc-p{font-size:.95rem;line-height:1.75;color:rgba(30,36,51,.88);margin-bottom:16px}
.doc-h3{font-size:1.1rem;font-weight:600;color:#1e2433;margin:32px 0 12px;display:flex;align-items:center;gap:8px}
.doc-h3::before{content:'';display:inline-block;width:4px;height:20px;border-radius:2px;background:rgba(59,130,246,.5);flex-shrink:0}
.doc-h4{font-size:1rem;font-weight:600;color:#1e2433;margin:24px 0 8px}

/* ─── List ───────────────────────────────────────────────────────────────────── */
.doc-list{list-style:none;margin:0 0 16px;padding:0}
.doc-list li{display:flex;gap:10px;font-size:.95rem;line-height:1.7;color:rgba(30,36,51,.88);margin-bottom:6px}
.doc-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:#3b82f6;flex-shrink:0;margin-top:8px}
.doc-steps{counter-reset:step;list-style:none;margin:0 0 16px;padding:0}
.doc-steps li{display:flex;gap:12px;font-size:.95rem;line-height:1.7;color:rgba(30,36,51,.88);margin-bottom:10px;counter-increment:step}
.doc-steps li::before{content:counter(step);width:24px;height:24px;border-radius:50%;background:#3b82f6;color:#fff;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}

/* ─── Table ──────────────────────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #e5e7eb;margin:20px 0}
table{width:100%;border-collapse:collapse;font-size:.9rem}
thead th{background:#f1f5f9;font-weight:600;text-align:left;padding:10px 14px;border-bottom:2px solid #e2e8f0;color:#374151;white-space:nowrap}
tbody td{padding:9px 14px;border-bottom:1px solid #f1f5f9;vertical-align:top;color:rgba(30,36,51,.88)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fafc}

/* ─── Image ──────────────────────────────────────────────────────────────────── */
.doc-figure{margin:24px 0}
.doc-img{
  border-radius:10px;border:1px solid #e5e7eb;
  box-shadow:0 4px 24px rgba(59,130,246,.06);
  cursor:zoom-in;transition:box-shadow .25s,transform .25s;
  width:100%;
}
.doc-img:hover{box-shadow:0 8px 40px rgba(59,130,246,.12);transform:translateY(-2px)}
figcaption{font-size:.82rem;color:#9ca3af;margin-top:10px;font-style:italic}

/* ─── Callout ────────────────────────────────────────────────────────────────── */
.doc-callout{
  background:#eff6ff;border-left:4px solid #3b82f6;border-radius:0 10px 10px 0;
  padding:14px 18px;margin:20px 0;font-size:.9rem;color:#1e3a5f;
}
.doc-callout strong{color:#1d4ed8}

/* ─── KBD table ──────────────────────────────────────────────────────────────── */
.kbd-table{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.kbd-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:8px}
kbd{display:inline-block;padding:3px 8px;font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:500;color:#374151;background:#f9fafb;border:1px solid #d1d5db;border-bottom-width:2px;border-radius:5px;white-space:nowrap}
.kbd-action{font-size:.875rem;color:rgba(30,36,51,.8)}

/* ─── Lightbox ───────────────────────────────────────────────────────────────── */
#lightbox{
  display:none;position:fixed;inset:0;background:rgba(15,20,50,.88);
  z-index:200;align-items:center;justify-content:center;cursor:zoom-out;
  animation:fadeIn .2s ease;
}
#lightbox.open{display:flex}
#lightbox img{max-width:92vw;max-height:90vh;border-radius:10px;box-shadow:0 8px 60px rgba(0,0,0,.5);cursor:default}
#lightbox-close{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:background .15s}
#lightbox-close:hover{background:rgba(255,255,255,.25)}

/* ─── Scroll-to-top ──────────────────────────────────────────────────────────── */
#scroll-top{
  position:fixed;bottom:28px;right:28px;width:40px;height:40px;
  border-radius:50%;background:#3b82f6;color:#fff;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(59,130,246,.35);opacity:0;
  transition:opacity .25s,transform .25s;transform:translateY(8px);z-index:60;
}
#scroll-top.visible{opacity:1;transform:translateY(0)}
#scroll-top svg{width:18px;height:18px}

/* ─── No results ─────────────────────────────────────────────────────────────── */
#no-results{display:none;text-align:center;padding:80px 20px;color:#9ca3af}
#no-results svg{width:48px;height:48px;margin:0 auto 16px;opacity:.3}

/* ─── Animations ─────────────────────────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ─── Responsive ─────────────────────────────────────────────────────────────── */
@media(max-width:1023px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #mobile-header{display:flex}
  #main{margin-left:0;padding-top:52px}
  #hero .hero-inner{padding:1.5rem 1rem 1.35rem}
  .hero-title{font-size:1.25rem}
  #quick-nav{padding:0 20px}
  #content{padding:32px 20px 60px}
  .kbd-table{grid-template-columns:1fr}
}
@media(max-width:480px){
  #hero .hero-inner{padding:1.25rem 0.875rem 1.15rem}
  #content{padding:24px 16px 48px}
  #quick-nav{padding:0 12px}
}
</style>
</head>
<body>

<!-- Mobile header -->
<div id="mobile-header">
  <button id="mobile-menu-btn" aria-label="Открыть меню">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <span class="mobile-logo"><span class="logo-dv">DV</span><span class="logo-stream">Stream</span></span>
</div>

<!-- Sidebar overlay -->
<div id="sidebar-overlay"></div>

<!-- Sidebar -->
<aside id="sidebar">
  <div id="sidebar-inner">
    <div class="sidebar-logo">
      <div class="sidebar-logo-row">
        <a class="sidebar-brand" href="/library" title="Медиатека">
          <div class="logo-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
          </div>
          <span class="logo-title"><span class="logo-dv">DV</span><span class="logo-stream">Stream</span></span>
        </a>
        <button type="button" id="sidebar-close-btn" class="sidebar-close-btn" aria-label="Закрыть панель">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6-6 6 6 6"/><path d="M3 12h14"/><path d="M21 19V5"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="Поиск..." autocomplete="off"/>
        <button id="search-clear" aria-label="Очистить поиск">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar-label">Содержание</div>
    <div id="nav-list"></div>

    <div class="sidebar-footer">
      <div class="sidebar-version">Версия 1.0 — Март 2026</div>
    </div>
  </div>
</aside>

<!-- Main -->
<main id="main">
  <div id="hero">
    <div class="hero-bg-pattern" aria-hidden="true"></div>
    <div class="hero-deco hero-deco--lg" aria-hidden="true"></div>
    <div class="hero-deco hero-deco--sm" aria-hidden="true"></div>
    <div class="hero-inner">
      <nav class="hero-breadcrumb" aria-label="Хлебные крошки">
        <svg class="hero-bc-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <a href="/library">DVStream</a>

  switch(block.type) {
    case 'paragraph':
      return `<p class="doc-p">${block.text}</p>`;
    case 'heading':
      return block.level===3
        ? `<h3 class="doc-h3">${block.text}</h3>`
        : `<h4 class="doc-h4">${block.text}</h4>`;
    case 'image':
      return `<figure class="doc-figure">
        <img class="doc-img" src="${CDN}/${block.src}" alt="${block.alt||''}" loading="lazy" data-src="${CDN}/${block.src}" data-alt="${block.alt||''}"/>
        ${block.caption?`<figcaption>${block.caption}</figcaption>`:''}
      </figure>`;
    case 'table':
      return `<div class="table-wrap"><table>
        <thead><tr>${block.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${block.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>`;
    case 'list':
      return `<ul class="doc-list">${block.items.map(i=>`<li><span>${i}</span></li>`).join('')}</ul>`;
    case 'steps':
      return `<ol class="doc-steps">${block.items.map(i=>`<li><span>${i}</span></li>`).join('')}</ol>`;
    case 'callout':
      return `<div class="doc-callout">${block.text}</div>`;
    case 'kbd-table':
      return `<div class="kbd-table">${block.rows.map(r=>`<div class="kbd-row"><kbd>${r.key}</kbd><span class="kbd-action">${r.action}</span></div>`).join('')}</div>`;
    default: return '';
  }
}

function renderSection(s) {
  return `<section id="${s.id}" class="doc-section" data-title="${s.title}" data-number="${s.number}">
    <div class="section-header">
      <div class="section-icon">${ICONS[s.icon]||''}</div>
      <div>
        <div class="section-meta">Раздел ${s.number}</div>
        <h2 class="section-title">${s.title}</h2>
      </div>
    </div>
    <hr class="section-divider"/>
    ${s.blocks.map(renderBlock).join('')}
  </section>`;
}

// ─── Build DOM ────────────────────────────────────────────────────────────────
const navList = document.getElementById('nav-list');
const quickNav = document.getElementById('quick-nav');
const container = document.getElementById('sections-container');

SECTIONS.forEach(s => {
  // Sidebar nav
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.dataset.id = s.id;
  btn.innerHTML = `${ICONS[s.icon]||''}<span>${s.number}. ${s.title}</span>`;
  btn.addEventListener('click', () => {
    scrollToSection(s.id);
    closeMobileSidebar();
  });
  navList.appendChild(btn);

  // Quick nav
  const qb = document.createElement('button');
  qb.className = 'qnav-btn';
  qb.dataset.id = s.id;
  qb.textContent = `${s.number}. ${s.title}`;
  qb.addEventListener('click', () => scrollToSection(s.id));
  quickNav.appendChild(qb);

  // Section content
  const div = document.createElement('div');
  div.innerHTML = renderSection(s);
  container.appendChild(div.firstElementChild);
});

// ─── Scroll & Active ──────────────────────────────────────────────────────────
function scrollToSection(id) {
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth'});
}

function setActive(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.id===id));
  document.querySelectorAll('.qnav-btn').forEach(b => b.classList.toggle('active', b.dataset.id===id));
  // Scroll quick nav to active
  const activeQnav = quickNav.querySelector('.qnav-btn.active');
  if(activeQnav) activeQnav.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) setActive(e.target.id); });
}, {rootMargin:'-20% 0px -70% 0px'});

document.querySelectorAll('.doc-section').forEach(s => observer.observe(s));

function syncHelpHeroSticky() {
  const hero = document.getElementById('hero');
  if (!hero) return;
  hero.classList.toggle('hero--compact', window.scrollY > 12);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.documentElement.style.setProperty('--help-hero-sticky-h', hero.offsetHeight + 'px');
    });
  });
}

function applyLocationHash() {
  const h = (location.hash || '').replace(/^#/, '');
  if (h && document.getElementById(h)) {
    setActive(h);
    requestAnimationFrame(() => {
      const el = document.getElementById(h);
      if (el) el.scrollIntoView({ behavior: 'auto', block: 'start' });
      syncHelpHeroSticky();
    });
  } else {
    setActive(SECTIONS[0].id);
  }
}
applyLocationHash();
requestAnimationFrame(() => syncHelpHeroSticky());
window.addEventListener('hashchange', () => {
  applyLocationHash();
  requestAnimationFrame(() => syncHelpHeroSticky());
});
window.addEventListener('resize', syncHelpHeroSticky);

// ─── Scroll-to-top ────────────────────────────────────────────────────────────
const scrollTopBtn = document.getElementById('scroll-top');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
  syncHelpHeroSticky();
}, { passive: true });
scrollTopBtn.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));

// ─── Lightbox ─────────────────────────────────────────────────────────────────
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
document.querySelectorAll('.doc-img').forEach(img => {
  img.addEventListener('click', () => {
    lightboxImg.src = img.dataset.src;
    lightboxImg.alt = img.dataset.alt;
    lightbox.classList.add('open');
    document.body.style.overflow='hidden';
  });
});
lightbox.addEventListener('click', e => {
  if(e.target===lightbox||e.target===document.getElementById('lightbox-close')) {
    lightbox.classList.remove('open');
    document.body.style.overflow='';
  }
});
document.addEventListener('keydown', e => {
  if(e.key==='Escape') { lightbox.classList.remove('open'); document.body.style.overflow=''; }
});

// ─── Search ───────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchClear = document.getElementById('search-clear');
const noResults = document.getElementById('no-results');

function stripHtml(html) { const d=document.createElement('div'); d.innerHTML=html; return d.textContent||''; }

function doSearch(q) {
  q = q.trim().toLowerCase();
  searchClear.style.display = q ? 'block' : 'none';
  let anyVisible = false;
  SECTIONS.forEach(s => {
    const sectionEl = document.getElementById(s.id);
    const navBtn = navList.querySelector(`[data-id="${s.id}"]`);
    if(!q) {
      sectionEl.style.display='';
      navBtn.classList.remove('hidden');
      anyVisible = true;
      return;
    }
    const titleMatch = s.title.toLowerCase().includes(q);
    const contentMatch = s.blocks.some(b => {
      if(b.text && stripHtml(b.text).toLowerCase().includes(q)) return true;
      if(b.items && b.items.some(i => stripHtml(i).toLowerCase().includes(q))) return true;
      if(b.table && b.table.rows.some(r => r.some(c => c.toLowerCase().includes(q)))) return true;
      if(b.rows && b.rows.some(r => r.action.toLowerCase().includes(q))) return true;
      return false;
    });
    const visible = titleMatch || contentMatch;
    sectionEl.style.display = visible ? '' : 'none';
    navBtn.classList.toggle('hidden', !visible);
    if(visible) anyVisible = true;
  });
  noResults.style.display = anyVisible ? 'none' : 'block';
}

searchInput.addEventListener('input', e => doSearch(e.target.value));
searchClear.addEventListener('click', () => { searchInput.value=''; doSearch(''); searchInput.focus(); });

// ─── Mobile sidebar ───────────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');
const mobileBtn = document.getElementById('mobile-menu-btn');

function openMobileSidebar() { sidebar.classList.add('open'); overlay.style.display='block'; document.body.style.overflow='hidden'; }
function closeMobileSidebar() { sidebar.classList.remove('open'); overlay.style.display='none'; document.body.style.overflow=''; }

mobileBtn.addEventListener('click', openMobileSidebar);
overlay.addEventListener('click', closeMobileSidebar);
document.getElementById('sidebar-close-btn')?.addEventListener('click', closeMobileSidebar);
</script>
</body>
</html>
